naftiko: 1.0.0-alpha2
info:
  label: Level2 TradeStation Integration API — Users
  description: 'Level2 TradeStation Integration API — Users. 2 operations. Lead operation: Create a broker user. Self-contained
    Naftiko capability covering one Level2 business surface.'
  tags:
  - Level2
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LEVEL2_API_KEY: LEVEL2_API_KEY
capability:
  consumes:
  - type: http
    namespace: tradestation-integration-users
    baseUri: https://api.trylevel2.com/v1
    description: Level2 TradeStation Integration API — Users business capability. Self-contained, no shared references.
    resources:
    - name: broker-users
      path: /broker/users
      operations:
      - name: createbrokeruser
        method: POST
        description: Create a broker user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: broker-users-userId
      path: /broker/users/{userId}
      operations:
      - name: getbrokeruser
        method: GET
        description: Get a broker user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.LEVEL2_API_KEY}}'
  exposes:
  - type: rest
    namespace: tradestation-integration-users-rest
    port: 8080
    description: REST adapter for Level2 TradeStation Integration API — Users. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/broker/users
      name: broker-users
      description: REST surface for broker-users.
      operations:
      - method: POST
        name: createbrokeruser
        description: Create a broker user
        call: tradestation-integration-users.createbrokeruser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/broker/users/{userid}
      name: broker-users-userid
      description: REST surface for broker-users-userId.
      operations:
      - method: GET
        name: getbrokeruser
        description: Get a broker user
        call: tradestation-integration-users.getbrokeruser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tradestation-integration-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Level2 TradeStation Integration API — Users. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-broker-user
      description: Create a broker user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tradestation-integration-users.createbrokeruser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-broker-user
      description: Get a broker user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tradestation-integration-users.getbrokeruser
      outputParameters:
      - type: object
        mapping: $.
